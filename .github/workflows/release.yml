name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example v0.1.0)"
        required: true
      ref:
        description: "Git ref to release from"
        required: false
        default: "main"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref_name || inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build
      RELEASE_DIR: ${{ github.workspace }}/release

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            ref_name="${{ inputs.ref }}"
          else
            version="${GITHUB_REF_NAME}"
            ref_name="${GITHUB_REF}"
          fi

          case "$version" in
            v*) ;;
            *) version="v$version" ;;
          esac

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "ref_name=$ref_name" >> "$GITHUB_OUTPUT"

      - name: Check out muxagent-cli
        uses: actions/checkout@v4
        with:
          path: muxagent-cli
          ref: ${{ steps.meta.outputs.ref_name }}

      - name: Resolve release target SHA
        id: target
        working-directory: muxagent-cli
        shell: bash
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: muxagent-cli/go.mod

      - name: Run tests
        working-directory: muxagent-cli
        run: go test ./...

      - name: Build muxagent binaries
        working-directory: muxagent-cli
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$BUILD_DIR"

          build() {
            local goos="$1"
            local goarch="$2"
            local output="$3"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags="-s -w -X github.com/LaLanMo/muxagent-cli/internal/version.Version=${{ steps.meta.outputs.version }}" \
              -o "$BUILD_DIR/$output" ./cmd/muxagent
          }

          build darwin amd64 muxagent-darwin-amd64
          build darwin arm64 muxagent-darwin-arm64
          build linux amd64 muxagent-linux-amd64
          build linux arm64 muxagent-linux-arm64
          build windows amd64 muxagent-windows-amd64.exe
          build windows arm64 muxagent-windows-arm64.exe

      - name: Fetch claude-agent-acp binaries
        working-directory: muxagent-cli
        run: bash ./scripts/build_claude_agent_acp.sh "$BUILD_DIR"

      - name: Package release bundles
        working-directory: muxagent-cli
        run: bash ./scripts/package_release_bundles.sh "$BUILD_DIR" "$RELEASE_DIR"

      - name: Verify signing key is configured
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${MUXAGENT_RELEASE_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "MUXAGENT_RELEASE_SIGNING_PRIVATE_KEY is not set" >&2
            exit 1
          fi
        env:
          MUXAGENT_RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.MUXAGENT_RELEASE_SIGNING_PRIVATE_KEY }}

      - name: Verify embedded signing key matches secret
        working-directory: muxagent-cli
        shell: bash
        run: |
          set -euo pipefail

          tmp_go="$(mktemp /tmp/muxagent-release-key.XXXXXX.go)"
          trap 'rm -f "$tmp_go"' EXIT

          cat >"$tmp_go" <<'EOF'
          package main

          import (
            "crypto/ed25519"
            "encoding/base64"
            "fmt"
            "os"
          )

          func main() {
            raw, err := base64.StdEncoding.DecodeString(os.Getenv("MUXAGENT_RELEASE_SIGNING_PRIVATE_KEY"))
            if err != nil {
              panic(err)
            }

            var privateKey ed25519.PrivateKey
            switch len(raw) {
            case ed25519.SeedSize:
              privateKey = ed25519.NewKeyFromSeed(raw)
            case ed25519.PrivateKeySize:
              privateKey = ed25519.PrivateKey(raw)
            default:
              panic("invalid private key length")
            }

            fmt.Print(base64.StdEncoding.EncodeToString(privateKey.Public().(ed25519.PublicKey)))
          }
          EOF

          actual_key="$(go run "$tmp_go")"

          if ! grep -Fq "\"$actual_key\"" cmd/muxagent/update/update.go; then
            echo "embedded release signing public key does not match MUXAGENT_RELEASE_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi
        env:
          MUXAGENT_RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.MUXAGENT_RELEASE_SIGNING_PRIVATE_KEY }}

      - name: Sign release manifest
        working-directory: muxagent-cli
        env:
          MUXAGENT_RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.MUXAGENT_RELEASE_SIGNING_PRIVATE_KEY }}
        run: go run ./scripts/sign_release -dir "$RELEASE_DIR" -version "${{ steps.meta.outputs.version }}"

      - name: Ensure release tag exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          target="${{ steps.target.outputs.sha }}"

          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$version" >/dev/null 2>&1; then
            exit 0
          fi

          gh api -X POST "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/tags/$version" \
            -f sha="$target"

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          assets=("$RELEASE_DIR"/*)

          if gh release view "$version" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$version" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$version" "${assets[@]}" \
              --draft \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$version"
          fi
